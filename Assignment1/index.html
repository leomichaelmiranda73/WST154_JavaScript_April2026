<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Book of Magic</title>

    <!-- CONNECT CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<main>
    <h1>THE BOOK OF MAGIC</h1>

    <form id="storyForm">
        <input type="text" id="personName" placeholder="Enter a name" required>
        <input type="text" id="place" placeholder="Enter a place" required>
        <input type="text" id="companion" placeholder="Enter a companion">
        <input type="text" id="timeOfDay" placeholder="Enter time of day" required>
        <input type="text" id="weather" placeholder="Enter weather" required>
        <input type="number" id="itemCount" placeholder="Enter item count" required>
        <input type="text" id="item" placeholder="Enter item" required>
        <input type="number" id="silverAmount" placeholder="Enter silver amount" required>
        <input type="text" id="magicType" placeholder="Enter magic type" required>
        <input type="text" id="familyMember" placeholder="Enter family member" required>

        <input type="submit" value="Generate Story">
    </form>

    <p id="story"></p>
</main>

<!-- CONNECT JS -->
<script src="js/script.js"></script>

</body>
</html>
